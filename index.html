<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Robô Gerador EAN-13 (Automação Industrial)</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="container">
    <h2>🤖 Robô Gerador EAN-13 (Sistema de Pacotes Completo)</h2>
    <p>Preencha os campos abaixo com os EANs. Gere as imagens, baixe em ZIP ou exporte os PDFs direto para o Kindle.</p>
    
    <div class="precificador-container">
        <div class="pacote-box">
            <label>📋 PRECIFICAÇÃO 1</label>
            <textarea id="cat-prec-1" placeholder="EANs avulsos aqui..."></textarea>
            <input type="text" id="nome-pdf-prec-1" class="input-nome-pacote" placeholder="Nome deste PDF (opcional)" />
        </div>
        <div class="pacote-box">
            <label>📋 PRECIFICAÇÃO 2</label>
            <textarea id="cat-prec-2" placeholder="EANs avulsos aqui..."></textarea>
            <input type="text" id="nome-pdf-prec-2" class="input-nome-pacote" placeholder="Nome deste PDF (opcional)" />
        </div>
    </div>
    
    <div class="grid-pacotes">
        <div class="pacote-box">
            <label>💊 MEDIC CONS PAC</label>
            <textarea id="cat-med-cons" placeholder="EANs aqui..."></textarea>
        </div>
        <div class="pacote-box">
            <label>🏪 CONVENIENCIA</label>
            <textarea id="cat-conv" placeholder="EANs aqui..."></textarea>
        </div>
        <div class="pacote-box">
            <label>🧬 MEDIC RX GENERICO</label>
            <textarea id="cat-med-rx" placeholder="EANs aqui..."></textarea>
        </div>
        <div class="pacote-box">
            <label>🧼 HIGIENE PESSOAL</label>
            <textarea id="cat-higiene" placeholder="EANs aqui..."></textarea>
        </div>
        <div class="pacote-box">
            <label>🧴 PERFUMARIA</label>
            <textarea id="cat-perfume" placeholder="EANs aqui..."></textarea>
        </div>
        <div class="pacote-box">
            <label>🧓 CUIDADO ADULTO</label>
            <textarea id="cat-adulto" placeholder="EANs aqui..."></textarea>
        </div>
        <div class="pacote-box">
            <label>👶 UNIVERSO INFANTIL</label>
            <textarea id="cat-infantil" placeholder="EANs aqui..."></textarea>
        </div>
        <div class="pacote-box">
            <label>✨ DERMOCOSMETICOS</label>
            <textarea id="cat-dermo" placeholder="EANs aqui..."></textarea>
        </div>
        <div class="pacote-box">
            <label>🐶 PET CARE</label>
            <textarea id="cat-petcare" placeholder="EANs aqui..."></textarea>
        </div>
        <div class="pacote-box">
            <label>🥗 NUTRIÇÃO SAUDÁVEL</label>
            <textarea id="cat-nutricao" placeholder="EANs aqui..."></textarea>
        </div>
        <div class="pacote-box">
            <label>🏷️ MIP MARCA</label>
            <textarea id="cat-mip" placeholder="EANs aqui..."></textarea>
        </div>
        <div class="pacote-box">
            <label>🛒 ALIMENTOS</label>
            <textarea id="cat-alimentos" placeholder="EANs aqui..."></textarea>
        </div>
    </div>
    
    <div class="botoes-acao">
        <button class="btn-gerar" onclick="gerarCodigos()">1. PROCESSAR IMAGENS</button>
        <button id="btnBaixarZip" class="btn-zip" onclick="baixarTodosZips()">2. 📦 BAIXAR ZIPS</button>
        <input type="text" id="nomeArquivoPdf" class="input-nome" placeholder="Nome do PDF dos Pacotes..." />
        <button id="btnBaixarPdf" class="btn-pdf" onclick="baixarTodosPdfs()">3. 📄 BAIXAR PDFs (KINDLE)</button>
    </div>

    <div id="resultado"></div>
</div>

<canvas id="hidden-canvas"></canvas>

<script src="script.js"></script>

</body>
</html>
